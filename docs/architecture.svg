    <rect class="box" x="754" y="134" width="150" height="44" fill="url(#brand)" opacity="0.85"/>
    <text class="bt" x="770" y="161" fill="#001018">AI Copilot</text>
    <rect class="box" x="918" y="134" width="140" height="44" fill="url(#brand)" opacity="0.85"/>
    <text class="bt" x="934" y="161" fill="#001018">Black Swan</text>
