  <rect class="box" x="654" y="346" width="150" height="50" fill="rgba(0,255,156,0.12)" stroke="rgba(0,255,156,0.5)"/>
  <text class="bt" x="666" y="368">7 · Procurement</text><text class="bs" x="666" y="384">Nash equilibrium</text>
  <rect class="box" x="654" y="402" width="150" height="50" fill="rgba(0,255,156,0.12)" stroke="rgba(0,255,156,0.5)"/>
