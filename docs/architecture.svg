<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>
    <linearGradient id="action" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF9C"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00E5FF"/>
    </marker>
    <style>
      .layer { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.08); rx: 16; }
      .ltitle { fill: #94A3B8; font-size: 12px; font-weight: 700; letter-spacing: 2px; }
      .box { rx: 11; }
      .bt { fill: #FFFFFF; font-size: 13px; font-weight: 600; }
      .bs { fill: #94A3B8; font-size: 10.5px; }
      .flow { stroke: rgba(0,229,255,0.45); stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .agent { fill: rgba(108,99,255,0.12); stroke: rgba(108,99,255,0.5); rx: 10; }
      .engine { fill: rgba(0,229,255,0.10); stroke: rgba(0,229,255,0.45); rx: 10; }
      .mlbox { fill: rgba(0,255,156,0.10); stroke: rgba(0,255,156,0.45); rx: 10; }
      .datab { fill: rgba(255,184,0,0.10); stroke: rgba(255,184,0,0.4); rx: 10; }
    </style>
  </defs>

  <rect width="1280" height="980" fill="url(#bg)"/>

  <!-- Header -->
  <text x="40" y="52" fill="#FFFFFF" font-size="30" font-weight="800" letter-spacing="3">PROJECT <tspan fill="#00E5FF">PHOENIX</tspan></text>
  <text x="40" y="76" fill="#94A3B8" font-size="14" letter-spacing="1">Geopolitical Energy Operating System (GEOS) — System Architecture</text>
  <rect x="980" y="32" width="260" height="44" rx="22" fill="rgba(0,255,156,0.06)" stroke="rgba(0,255,156,0.4)"/>
  <circle cx="1006" cy="54" r="5" fill="#00FF9C" filter="url(#glow)"/>
  <text x="1020" y="59" fill="#00FF9C" font-size="13" font-weight="700">9 AGENTS · &lt;100ms RESPONSE</text>

