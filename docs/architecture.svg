  <rect class="layer" x="40" y="100" width="1200" height="92"/>
  <text class="ltitle" x="58" y="124">PRESENTATION · NATIONAL ENERGY COMMAND CENTER</text>
  <g>
    <rect class="box" x="58" y="134" width="172" height="44" fill="url(#brand)" opacity="0.85"/>
    <text class="bt" x="74" y="161" fill="#001018">Executive Command</text>
    <rect class="box" x="244" y="134" width="150" height="44" fill="url(#brand)" opacity="0.85"/>
    <text class="bt" x="260" y="161" fill="#001018">Global Map · Twin</text>
    <rect class="box" x="408" y="134" width="168" height="44" fill="url(#brand)" opacity="0.85"/>
