  <text class="bt" x="238" y="368">2 · Geopolitical</text><text class="bs" x="238" y="384">tension · risk</text>
  <rect class="agent" x="226" y="402" width="132" height="50"/>
  <text class="bt" x="238" y="424">3 · Maritime</text><text class="bs" x="238" y="440">corridors · reroute</text>
  <rect class="agent" x="368" y="346" width="124" height="50"/>
  <text class="bt" x="380" y="368">4 · Sanctions</text><text class="bs" x="380" y="384">exposure</text>

  <text class="bs" x="510" y="338" fill="#6C63FF" font-weight="700">ANALYSIS</text>
  <rect class="agent" x="510" y="346" width="132" height="50"/>
  <text class="bt" x="522" y="368">5 · War-Gamer</text><text class="bs" x="522" y="384">Monte Carlo</text>
  <rect class="agent" x="510" y="402" width="132" height="50"/>
