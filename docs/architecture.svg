  <text class="ltitle" x="58" y="684">DATA LAYER · streaming + structured</text>
  <rect class="datab" x="58" y="696" width="200" height="44"/>
  <text class="bt" x="72" y="716">Live Market Feed</text><text class="bs" x="72" y="732">Brent/WTI/gas/FX · cache+fallback</text>
  <rect class="datab" x="272" y="696" width="200" height="44"/>
  <text class="bt" x="286" y="716">Supply-Chain Model</text><text class="bs" x="286" y="732">suppliers·corridors·refineries·SPR</text>
  <rect class="datab" x="486" y="696" width="200" height="44"/>
  <text class="bt" x="500" y="716">Event Catalog</text><text class="bs" x="500" y="732">6 shock scenarios + levers</text>
  <rect class="datab" x="700" y="696" width="220" height="44"/>
  <text class="bt" x="714" y="716">Roadmap: AIS · GDELT · EIA</text><text class="bs" x="714" y="732">live geopolitical/vessel feeds</text>
  <rect class="datab" x="934" y="696" width="288" height="44"/>
  <text class="bt" x="948" y="716">Synthetic training corpus</text><text class="bs" x="948" y="732">documented generative process</text>

  <!-- vertical flow arrows between layers -->
  <line class="flow" x1="640" y1="192" x2="640" y2="206"/>
  <line class="flow" x1="640" y1="272" x2="640" y2="286"/>
  <line class="flow" x1="334" y1="478" x2="334" y2="492"/>
  <line class="flow" x1="940" y1="478" x2="940" y2="492"/>
  <line class="flow" x1="334" y1="644" x2="334" y2="658"/>
  <line class="flow" x1="940" y1="644" x2="940" y2="658"/>

  <!-- footer -->
  <text x="40" y="792" fill="#94A3B8" font-size="12">Full national response in &lt;100 ms · 52 passing tests · ET AI Hackathon 2026 · Problem #2 — Energy Supply Chain Resilience</text>
